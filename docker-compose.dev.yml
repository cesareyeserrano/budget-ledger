# Ambiente de PRUEBAS reproducible (modo servidor) — un comando, cero setup.
#   docker compose -f docker-compose.dev.yml up -d --build      # levantar
#   docker compose -f docker-compose.dev.yml down               # parar (conserva datos)
#   docker compose -f docker-compose.dev.yml down -v            # parar + BORRAR datos
# App en http://localhost:3100 · Postgres en localhost:5432 (user/pass/db = ledger).
# NO es producción: usa un secreto de desarrollo fijo. Para producción usa docker-compose.yml.
services:
  db:
    image: postgres:16-alpine
    container_name: ledger-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    volumes:
      - ledger_devdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      # El build inlinea NEXT_PUBLIC_LEDGER_SERVER_MODE=true (modo servidor). El entrypoint del
      # Dockerfile corre las migraciones (idempotentes) antes de servir.
    image: t-ledger-dev:latest
    container_name: ledger-dev-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgres://ledger:ledger@db:5432/ledger
      # Secreto de DESARROLLO (no producción; el marcador lo excluye del gate de secretos).
      BETTER_AUTH_SECRET: dev-secret-not-for-production-do-not-use-000000
      BETTER_AUTH_URL: http://localhost:3100
      # Google deshabilitado (sin credenciales); el botón se muestra deshabilitado.
      NEXT_PUBLIC_GOOGLE_ENABLED: "false"
    ports:
      - "3100:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Visor web de la BD (pgweb): se conecta solo vía DATABASE_URL, sin login. http://localhost:8081
  db-viewer:
    image: sosedoff/pgweb:latest
    container_name: ledger-dev-pgweb
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ledger:ledger@db:5432/ledger?sslmode=disable
    ports:
      - "8081:8081"

volumes:
  ledger_devdata:
