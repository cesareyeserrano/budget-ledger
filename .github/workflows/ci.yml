name: CI

# NFR-503: corre la suite completa (unit + e2e) en cada push/PR a main; falla si algo falla.
# NFR-513: gates de seguridad automatizados — SCA (npm audit) + escaneo de secretos.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Semanal SOLO para el job de seguridad: un CVE nuevo aparece en una dependencia que no has tocado,
  # así que sin cron no te enterarías hasta el siguiente commit. Lunes 05:17 UTC.
  schedule:
    - cron: "17 5 * * 1"

# GITHUB_TOKEN con permiso mínimo. Sin este bloque, el token hereda permisos de escritura amplios:
# cualquier dependencia comprometida ejecutándose en un step podría escribir en el repo.
permissions:
  contents: read

# Un push nuevo sobre la misma rama cancela la corrida anterior (la suite e2e es cara).
# En main NO se cancela: cada commit de main debe quedar validado por sí mismo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # La corrida semanal solo tiene sentido para el job `security` (CVEs nuevos): el código no ha
    # cambiado, así que reejecutar toda la suite e2e sería quemar minutos de runner sin señal nueva.
    if: github.event_name != 'schedule'
    steps:
      # Actions fijadas por SHA de commit, no por tag: un tag puede reapuntarse a código malicioso
      # si se compromete el repo de la action. Dependabot (github-actions) mantiene estos SHAs.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "npm"
      # `npm ci` a secas, sin fallback. El antiguo `npm ci || npm install --legacy-peer-deps` hacía
      # que, si el lockfile estaba desincronizado, el CI resolviera dependencias por su cuenta:
      # instalaba versiones que nadie revisó y anulaba la garantía de integridad del lockfile.
      # Mejor romper el build de forma ruidosa y arreglar el lockfile.
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      # Unit + integration (incl. backend: testcontainers levanta Postgres vía el Docker del runner).
      - name: Unit + integration tests
        run: npm run test:run
      - name: Build
        run: npm run build
      - name: E2E (Playwright — app en modo localStorage)
        run: |
          npx playwright install --with-deps chromium
          npm run test:e2e
      - name: E2E backend (app en modo servidor + Postgres efímero)
        run: npx playwright test --config playwright.backend.config.ts

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      # SCA (NFR-513): falla ante vulnerabilidad de dependencias de severidad alta/crítica.
      - name: SCA — npm audit
        run: npm audit --audit-level=high
      # Escaneo de secretos (NFR-513): ningún secreto hardcodeado en el árbol de fuentes.
      # El script prefiere gitleaks si está instalado; en el runner cae al fallback de patrones.
      - name: Secret scan
        run: ./scripts/secret-scan.sh
